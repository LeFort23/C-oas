<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECT: BLACK ARCHIVE</title>
    <!-- Importing eerie fonts from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fontsfonts.googleapis.com/css2?family=Creepster&family=Special+Elite&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        /* =========================================
           RESET & CORE VARIABLES
           ========================================= */
        :root {
            --bg-color: #050505;
            --text-primary: #a8a8a8;
            --text-highlight: #dcdcdc;
            --accent-red: #8a0f0f;
            --accent-blood: #660000;
            --scanline-color: rgba(0, 0, 0, 0.5);
            --glitch-color-1: #00ffea;
            --glitch-color-2: #ff0055;
            --card-bg: #0e0e0e;
            --font-typewriter: 'Special Elite', cursive;
            --font-digital: 'Share Tech Mono', monospace;
            --font-horror: 'Creepster', cursive;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-typewriter);
            overflow-x: hidden;
            min-height: 100vh;
            cursor: crosshair;
        }

        /* =========================================
           ATMOSPHERIC EFFECTS (Grain, Scanlines, Vignette)
           ========================================= */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9999;
        }

        /* CRT Scanlines */
        .scanlines {
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.2) 50%,
                rgba(0,0,0,0.2)
            );
            background-size: 100% 4px;
            animation: scrollScan 10s linear infinite;
        }

        /* Vignette */
        .vignette {
            background: radial-gradient(
                circle,
                rgba(0,0,0,0) 50%,
                rgba(0,0,0,0.9) 100%
            );
        }

        /* Film Grain Noise Animation */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.08;
            z-index: 9998;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* =========================================
           HEADER & NAVIGATION
           ========================================= */
        header {
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid var(--accent-blood);
            position: relative;
            margin-bottom: 40px;
        }

        h1 {
            font-family: var(--font-digital);
            font-size: 3rem;
            letter-spacing: 5px;
            color: var(--accent-blood);
            text-shadow: 0 0 10px rgba(138, 15, 15, 0.5);
            text-transform: uppercase;
            position: relative;
            display: inline-block;
        }

        h1::before, h1::after {
            content: "CLASSIFIED";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            overflow: hidden;
            color: var(--text-highlight);
            opacity: 0.8;
        }

        h1::before {
            left: 2px;
            text-shadow: -1px 0 var(--glitch-color-2);
            clip-path: inset(24% 0 29% 0);
            animation: glitch2 2.5s infinite linear alternate-reverse;
        }

        h1::after {
            left: -2px;
            text-shadow: -1px 0 var(--glitch-color-1);
            clip-path: inset(85% 0 1% 0);
            animation: glitch 4s infinite linear alternate-reverse;
        }

        .case-number {
            font-family: var(--font-typewriter);
            font-size: 1rem;
            color: #444;
            margin-top: 10px;
        }

        /* Floating Classification Stamp */
        .stamp {
            position: absolute;
            top: 20px;
            right: 20px;
            border: 2px solid var(--accent-red);
            color: var(--accent-red);
            padding: 5px 15px;
            transform: rotate(15deg);
            font-family: var(--font-digital);
            opacity: 0.7;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* =========================================
           GRID CONTAINER
           ========================================= */
        .archive-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            padding: 20px 40px 80px 40px;
            max-width: 1400px;
            margin: 0 auto;
            perspective: 1000px;
        }

        /* =========================================
           MEMBER PROFILE CARD ("CASE FILE")
           ========================================= */
        .file-card {
            background: var(--card-bg);
            border: 1px solid #1a1a1a;
            padding: 0;
            position: relative;
            display: flex;
            flex-direction: column;
            transition: all 0.4s ease;
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
            /* Old Folder Style: slightly yellowed filter */
            filter: sepia(30%) contrast(110%);
        }

        .file-card:hover {
            transform: scale(1.02) skewX(-2deg);
            border-color: var(--accent-red);
            box-shadow: 0 0 25px rgba(138, 15, 15, 0.3);
            filter: sepia(0%) contrast(120%);
            z-index: 100;
        }

        /* The "Mugshot" Area */
        .photo-frame {
            width: 100%;
            height: 250px;
            overflow: hidden;
            position: relative;
            background: #000;
            border-bottom: 2px solid var(--accent-blood);
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) brightness(0.8) blur(1px);
            transition: all 0.5s ease;
            opacity: 0.6;
        }

        .file-card:hover .photo-frame img {
            filter: grayscale(0%) brightness(1.1) contrast(120%);
            opacity: 1;
        }

        /* Grunge overlay on image */
        .photo-frame::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1IiBoZWlnaHQ9IjUiPgo8cmVjdCB3aWR0aD0iNSIgaGVpZ2h0PSI1IiBmaWxsPSIjZmZmIiBmaWxsLW9wYWNpdHk9IjAuMDUiLz4KPC9zdmc+');
            pointer-events: none;
        }

        /* Card Body */
        .file-content {
            padding: 20px;
            position: relative;
        }

        /* Redaction Tape Effect on Top */
        .file-content::before {
            content: "CONFIDENTIAL";
            position: absolute;
            top: 10px;
            right: -30px;
            background: var(--accent-blood);
            color: #000;
            font-size: 0.6rem;
            padding: 2px 20px;
            transform: rotate(45deg);
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            opacity: 0.8;
        }

        .subject-id {
            font-family: var(--font-digital);
            font-size: 0.8rem;
            color: var(--accent-red);
            margin-bottom: 5px;
            display: block;
        }

        .username {
            font-family: var(--font-typewriter);
            font-size: 1.5rem;
            color: var(--text-highlight);
            margin-bottom: 10px;
            border-bottom: 1px dashed #333;
            padding-bottom: 5px;
        }

        .alias {
            display: block;
            font-size: 0.9rem;
            color: var(--accent-red);
            margin-top: -5px;
            font-style: italic;
            opacity: 0.7;
        }

        .quote {
            font-family: var(--font-typewriter);
            font-size: 0.95rem;
            line-height: 1.4;
            color: #777;
            margin-top: 15px;
            font-style: italic;
            position: relative;
            padding-left: 15px;
        }

        .quote::before {
            content: ">>";
            position: absolute;
            left: 0;
            color: var(--accent-red);
        }

        .file-status {
            position: absolute;
            bottom: 10px;
            right: 15px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #222;
            box-shadow: 0 0 5px #222;
            animation: pulse 3s infinite;
        }

        .file-card:hover .file-status {
            background-color: var(--accent-blood);
            box-shadow: 0 0 10px var
