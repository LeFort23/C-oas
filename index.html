<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ℭ-oas Terminal</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at center, #010101, #000000 70%);
  color: #cfcfcf;
  overflow-x: hidden;
  animation: flicker 6s infinite;
  background-size: 200% 200%;
}

/* subtle cinematic flicker */
@keyframes flicker {
  0%, 100% { opacity: 1; }
  45% { opacity: 0.98; }
  50% { opacity: 0.96; }
  55% { opacity: 1; }
}

/* atmospheric haze overlay */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 30% 20%, rgba(255,255,255,0.03), transparent 40%),
    radial-gradient(circle at 70% 80%, rgba(255,255,255,0.02), transparent 45%);
  pointer-events: none;
  z-index: 999;
  animation: haze 8s ease-in-out infinite alternate;
}

@keyframes haze {
  from { opacity: 0.3; }
  to { opacity: 0.6; }
}

/* film grain */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: url("https://www.transparenttextures.com/patterns/noise.png");
  opacity: 0.05;
  pointer-events: none;
  z-index: 1000;
}

/* ================= INTRO ================= */
.intro {
  position: fixed;
  inset: 0;
  background: #000;
  display: grid;
  place-items: center;
  text-align: center;
  z-index: 2000;
  cursor: pointer;
}

.intro h1 {
  font-size: 32px;
  margin: 0;
  background: linear-gradient(90deg, #555, #999, #555);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: glitch 2.5s infinite;
}

@keyframes glitch {
  0% { transform: translate(0); }
  20% { transform: translate(-1px, 1px); }
  40% { transform: translate(1px, -1px); }
  60% { opacity: 0.8; }
  100% { transform: translate(0); opacity: 1; }
}

.intro p {
  color: #444;
  margin-top: 10px;
  letter-spacing: 2px;
  opacity: 0.5;
}

.intro.hide {
  animation: bootOut 1.2s forwards;
}

@keyframes bootOut {
  0% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(1.1); filter: blur(10px); }
}

/* ================= TITLE ================= */
.title {
  text-align: center;
  font-size: 34px;
  margin-top: 30px;
  color: #aaa;
  letter-spacing: 1px;
}

/* ================= GRID ================= */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  padding: 40px;
}

/* ================= CARDS ================= */
.card {
  background: linear-gradient(145deg, #050505, #0a0a0a);
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: 18px;
  height: 260px;
  position: relative;
  overflow: hidden;
  opacity: 0;
  transform: translateY(20px);
  filter: blur(8px);
  transition: 0.9s cubic-bezier(0.16, 1, 0.3, 1);
  cursor: pointer;
}

.card.revealed {
  animation: awaken 1.2s ease forwards;
  opacity: 0.9;
}

@keyframes awaken {
  from {
    opacity: 0;
    transform: translateY(25px);
    filter: blur(10px);
  }
  to {
    opacity: 0.9;
    transform: translateY(0);
    filter: blur(0);
  }
}

.card:hover {
  opacity: 1;
  filter: brightness(1.1);
  transform: translateY(-6px) scale(1.02);
}

.card:active {
  transform: scale(0.98);
  filter: brightness(1.2);
}

/* ================= CONTENT ================= */
.banner {
  height: 90px;
  background: url('https://i.pinimg.com/originals/13/56/e5/1356e5ff229a2270742a7b83cac46e83.gif');
  background-size: cover;
  filter: brightness(0.25);
}

.avatar {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  position: absolute;
  top: 50px;
  left: 20px;
  background-size: cover;
  border: 1px solid #111;
  opacity: 0.9;
}

.content {
  padding: 50px 20px 20px;
}

.name {
  font-size: 18px;
  font-weight: bold;
  color: #c9c9c9;
  letter-spacing: 0.5px;
  transition: 0.6s ease;
}

.card:hover .name {
  letter-spacing: 1px;
  color: #fff;
}

.role {
  font-size: 12px;
  color: #5a5a5a;
}

.desc {
  font-size: 12px;
  color: #6f6f6f;
  margin-top: 10px;
}

/* ================= MODAL ================= */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  backdrop-filter: blur(6px);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 3000;
}

.modal.show {
  display: flex;
}

.modal-content {
  background: #050505;
  border: 1px solid rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 15px;
  width: 300px;
  text-align: center;
  animation: popIn 0.25s ease-out;
}

@keyframes popIn {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.modal-avatar {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  margin: 0 auto 15px;
  background-size: cover;
  border: 1px solid #222;
}

.modal-close {
  position: absolute;
  margin-left: 240px;
  cursor: pointer;
  color: #777;
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">
  <div>
    <h1>ℭ-oas System Access</h1>
    <p>press to initiate</p>
  </div>
</div>

<h1 class="title">The ℭ-oas Roaster</h1>

<div class="grid">

  <!-- CARDS (unchanged content, just stylized differently) -->
  <div class="card">
    <div class="banner"></div>
    <div class="avatar" style="background-image:url('https://i.pinimg.com/736x/ad/0c/77/ad0c77384faba41c5432db58ff538311.jpg');"></div>
    <div class="content">
      <div class="name">Profanity | Oppressionist</div>
      <div class="role">Founder</div>
      <div class="desc">Humans are the root of all evil</div>
    </div>
  </div>

  <div class="card">
    <div class="banner"></div>
    <div class="avatar" style="background-image:url('https://i.pinimg.com/736x/d2/f2/a5/d2f2a543b6ce395e98a572b5f04203bb.jpg');"></div>
    <div class="content">
      <div class="name">Glock</div>
      <div class="role">Co-owner</div>
      <div class="desc">My heart is tied to the ones I love</div>
    </div>
  </div>

  <div class="card">
    <div class="banner"></div>
    <div class="avatar" style="background-image:url('https://i.pinimg.com/736x/70/68/11/7068114b8281581b056be24ba036327a.jpg');"></div>
    <div class="content">
      <div class="name">Valentine</div>
      <div class="role">CEO</div>
      <div class="desc">Happy to be here</div>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-close" id="close">✕</div>
    <div class="modal-avatar" id="mAvatar"></div>
    <h2 id="mName"></h2>
    <p id="mRole"></p>
    <p id="mDesc"></p>
  </div>
</div>

<script>
const intro = document.getElementById("intro");
const cards = document.querySelectorAll(".card");
const modal = document.getElementById("modal");
const mName = document.getElementById("mName");
const mRole = document.getElementById("mRole");
const mDesc = document.getElementById("mDesc");
const mAvatar = document.getElementById("mAvatar");
const close = document.getElementById("close");

/* INTRO */
intro.addEventListener("click", () => {
  intro.classList.add("hide");

  cards.forEach((c, i) => {
    setTimeout(() => {
      c.classList.add("revealed");
    }, i * 180);
  });

  setTimeout(() => intro.remove(), 1200);
});

/* MODAL */
cards.forEach(card => {
  card.addEventListener("click", () => {
    mName.innerText = card.querySelector(".name").innerText;
    mRole.innerText = card.querySelector(".role").innerText;
    mDesc.innerText = card.querySelector(".desc").innerText;
    mAvatar.style.backgroundImage = card.querySelector(".avatar").style.backgroundImage;
    modal.classList.add("show");
  });
});

close.addEventListener("click", () => modal.classList.remove("show"));

modal.addEventListener("click", (e) => {
  if (e.target === modal) modal.classList.remove("show");
});
</script>

</body>
</html>
