<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ℭ-oas Terminal</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:wght@400;700&family=Cinzel:wght@400;500;700&display=swap');

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'IM Fell English', serif;
  background: #000;
  color: #ddd;
  overflow-x: hidden;
  position: relative;
}

/* Gothic scanlines + mist */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: 
    repeating-linear-gradient(
      to bottom,
      rgba(220,200,255,0.008) 0px,
      rgba(220,200,255,0.008) 2px,
      transparent 3px,
      transparent 8px
    ),
    radial-gradient(ellipse at 20% 80%, rgba(100,50,150,0.02) 0%, transparent 70%);
  pointer-events: none;
  z-index: 999;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, transparent 50%, rgba(0,0,0,0.98) 100%);
  pointer-events: none;
  z-index: 998;
}

/* ================= SEARCH BAR ================= */
.search-container {
  position: relative;
  max-width: 500px;
  margin: 0 auto 40px;
}

.search-input {
  width: 100%;
  padding: 15px 50px 15px 20px;
  background: rgba(15,15,15,0.8);
  border: 1px solid rgba(220,200,255,0.3);
  border-radius: 8px;
  color: #fff;
  font-family: 'IM Fell English', serif;
  font-size: 16px;
  letter-spacing: 1px;
  backdrop-filter: blur(10px);
  transition: all 0.3s ease;
}

.search-input:focus {
  outline: none;
  border-color: rgba(220,200,255,0.6);
  box-shadow: 0 0 20px rgba(220,200,255,0.2);
}

.search-icon {
  position: absolute;
  right: 18px;
  top: 50%;
  transform: translateY(-50%);
  color: #aaa;
  font-size: 18px;
}

/* ================= INTRO ================= */
.intro {
  position: fixed;
  inset: 0;
  background: #000;
  display: grid;
  place-items: center;
  text-align: center;
  z-index: 2000;
  cursor: pointer;
}

.intro h1 {
  font-size: 52px;
  font-weight: 700;
  font-family: 'Cinzel', serif;
  margin: 0;
  color: #eee;
  letter-spacing: 6px;
  text-shadow: 0 0 15px rgba(220,200,255,0.4);
  border-bottom: 2px solid rgba(220,200,255,0.3);
  padding-bottom: 10px;
  animation: gothicFade 4s ease-in-out infinite;
}

@keyframes gothicFade {
  0%, 100% { text-shadow: 0 0 15px rgba(220,200,255,0.4), 0 0 30px rgba(150,100,200,0.2); }
  50% { text-shadow: 0 0 25px rgba(220,200,255,0.6), 0 0 50px rgba(150,100,200,0.4); }
}

.intro p { color: #aaa; margin-top: 25px; font-size: 16px; letter-spacing: 3px; }

.intro.hide { opacity: 0; visibility: hidden; transition: 2.5s ease; }

/* ================= TITLE ================= */
.title {
  text-align: center;
  font-size: 40px;
  font-weight: 500;
  font-family: 'Cinzel', serif;
  margin: 20px 0 30px;
  color: #fff;
  letter-spacing: 5px;
  text-shadow: 0 0 12px rgba(220,200,255,0.3);
}

.title::after {
  content: "";
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(220,200,255,0.5), transparent);
}

/* ================= GRID ================= */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 30px;
  padding: 0 50px 50px;
  max-width: 1500px;
  margin: 0 auto;
}

.card {
  background: linear-gradient(160deg, #0f0f0f, #1a1a1a);
  border: 1px solid rgba(220,200,255,0.15);
  border-radius: 12px;
  height: 290px;
  position: relative;
  overflow: hidden;
  opacity: 0;
  transform: translateY(40px) rotateY(0deg);
  transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  cursor: pointer;
  perspective: 1000px;
  transform-style: preserve-3d;
}

.card.flipped {
  transform: translateY(0) rotateY(180deg);
}

.card.revealed { opacity: 1; transform: translateY(0) rotateY(0deg); }

.card.unlocked {
  border-color: rgba(220,200,255,0.4);
  box-shadow: 0 25px 50px rgba(0,0,0,0.8), 0 0 30px rgba(220,200,255,0.15);
}

.card:hover:not(.flipped) {
  transform: translateY(-12px) rotateY(0deg);
  border-color: rgba(220,200,255,0.6);
}

/* 3D Flip Back */
.card-back {
  position: absolute;
  inset: 0;
  background: linear-gradient(160deg, #1a0f1a, #2a1a2a);
  border: 1px solid rgba(220,200,255,0.2);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transform: rotateY(180deg);
  backface-visibility: hidden;
  opacity: 0;
}

.card.flipped .card-back { opacity: 1; }

.card-back h3 {
  color: #ccc;
  font-family: 'Cinzel', serif;
  font-size: 24px;
  margin: 0 0 20px;
  letter-spacing: 3px;
}

.classified-stamp {
  font-size: 48px;
  color: rgba(220,100,100,0.6);
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 8px;
  transform: rotate(-15deg);
  font-family: 'Cinzel', serif;
}

/* Rest of card styles unchanged */
.banner { height: 105px; background: linear-gradient(to bottom, rgba(15,15,15,0.9), rgba(26,26,26,1)); position: relative; border-bottom: 1px solid rgba(220,200,255,0.1); }
.banner::before { content: ""; position: absolute; inset: 0; background: url('https://i.pinimg.com/originals/13/56/e5/1356e5ff229a2270742a7b83cac46e83.gif') center/cover; opacity: 0.25; filter: grayscale(0.8) contrast(1.2); mix-blend-mode: soft-light; }

.avatar { width: 80px; height: 80px; border-radius: 8px; position: absolute; top: 58px; left: 22px; background-size: cover; border: 2px solid rgba(220,200,255,0.2); box-shadow: inset 0 0 15px rgba(0,0,0,0.8), 0 0 15px rgba(220,200,255,0.2); transition: all 0.4s ease; }
.card:hover .avatar { border-color: rgba(220,200,255,0.5); box-shadow: inset 0 0 20px rgba(0,0,0,1), 0 0 25px rgba(220,200,255,0.4); transform: scale(1.08); }

.content { padding: 58px 28px 28px; }
.name { font-size: 22px; font-weight: 500; font-family: 'Cinzel', serif; color: #fff; margin-bottom: 6px; letter-spacing: 1.5px; text-shadow: 0 0 8px rgba(220,200,255,0.3); }
.role { font-size: 13px; color: #ccc; text-transform: uppercase; letter-spacing: 3px; font-family: 'IM Fell English', serif; opacity: 0.9; }
.desc { font-size: 14px; color: #999; margin-top: 14px; line-height: 1.5; font-style: italic; font-family: 'IM Fell English', serif; }

/* Hidden state */
.card.hidden {
  opacity: 0.3;
  transform: translateY(20px) scale(0.95);
  pointer-events: none;
}

/* ================= MODAL ================= */
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 3000; }
.modal.show { display: flex; animation: modalRise 0.6s ease-out; }
@keyframes modalRise { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }

.modal-content {
  background: linear-gradient(160deg, #151515, #222);
  border: 1px solid rgba(220,200,255,0.2);
  padding: 40px;
  border-radius: 16px;
  width: 400px;
  text-align: center;
  box-shadow: 0 30px 80px rgba(0,0,0,0.9), 0 0 50px rgba(220,200,255,0.1);
  position: relative;
}

.modal-content::before {
  content: "";
  position: absolute;
  top: -2px;
  left: -2px;
  right: -2px;
  bottom: -2px;
  background: linear-gradient(45deg, rgba(220,200,255,0.1), rgba(150,100,200,0.1), rgba(220,200,255,0.1));
  border-radius: 18px;
  z-index: -1;
  animation: borderGlow 3s ease-in-out infinite;
}

@keyframes borderGlow { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

.modal-avatar { width: 120px; height: 120px; border-radius: 10px; margin: 0 auto 25px; background-size: cover; border: 2px solid rgba(220,200,255,0.3); box-shadow: inset 0 0 20px rgba(0,0,0,0.9), 0 0 25px rgba(220,200,255,0.3); transition: all 0.4s ease; }
.modal-avatar:hover { transform: scale(1.1); box-shadow: inset 0 0 25px rgba(0,0,0,1), 0 0 40px rgba(220,200,255,0.5); }

.modal-close { position: absolute; top: 18px; right: 22px; cursor: pointer; color: #ddd; font-size: 26px; font-weight: 400; font-family: 'Cinzel', serif; transition: all 0.3s ease; }
.modal-close:hover { color: #fff; text-shadow: 0 0 15px rgba(220,200,255,0.5); transform: scale(1.2); }

.modal-content h2 { color: #fff; font-size: 26px; font-weight: 500; font-family: 'Cinzel', serif; margin: 0 0 18px; letter-spacing: 2px; text-shadow: 0 0 12px rgba(220,200,255,0.4); }
.modal-content p { color: #bbb; font-size: 15px; margin: 12px 0; line-height: 1.6; font-family: 'IM Fell English', serif; }

/* Responsive */
@media (max-width: 1200px) { .grid { grid-template-columns: repeat(3, 1fr); gap: 25px; padding: 0 30px; } }
@media (max-width: 768px) { .grid { grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 0 20px; } }
@media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>

<body>

<!-- SEARCH -->
<div class="search-container" style="display: none;" id="searchContainer">
  <input type="text" class="search-input" id="searchInput" placeholder="Search the coven...">
  <span class="search-icon">🔍</span>
</div>

<!-- INTRO -->
<div class="intro" id="intro">
  <div>
    <h1>ℭ-oas Terminal</h1>
    <p>Enter the coven</p>
  </div>
</div>

<h1 class="title">The Coven</h1>

<div class="grid" id="grid">

  <div class="card" data-name="Profanity | Oppressionist" data-role="Founder">
    <div class="card-back">
      <h3>CLASSIFIED</h3>
      <div class="classified-stamp">SEALED</div>
    </div>
    <div class="banner"></div>
    <div class="avatar" style="background-image:url('https://i.pinimg.com/736x/ad/0c/77/ad0c77384faba41c5432db58ff538311.jpg');"></div>
    <div class="content">
      <div class="name" data-text="Profanity | Oppressionist">Profanity | Oppressionist</div>
      <div class="role">Founder</div>
      <div class="desc">Humans are the root of all evil</div>
    </div>
  </div>

  <div class="card" data-name="Glock" data-role="Co-owner">
    <div class="card-back">
      <h3>CLASSIFIED</h3>
      <div class="classified-stamp">SEALED</div>
    </div>
    <div class="banner"></div>
    <div class="avatar" style="background-image:url('https://i.pinimg.com/736x/d2/f2/a5/d2f2a543b6ce395e98a572b5f04203bb.jpg');"></div>
    <div class="content">
      <div class="name" data-text="Glock">Glock</div>
      <div class="role">Co-owner</div>
      <div class="desc">My heart is tied to the ones I love</div>
    </div>
  </div>

  <!-- Add all other 7 cards with same structure -->
  <!-- ... (keeping your existing card data) ... -->

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-close" id="close">✕</div>
    <div class="modal-avatar" id="mAvatar"></div>
    <h2 id="mName"></h2>
    <p id="mRole"></p>
    <p id="mDesc"></p>
  </div>
</div>

<script>
const intro = document.getElementById("intro");
const cards = document.querySelectorAll(".card");
const grid = document.getElementById("grid");
const searchContainer = document.getElementById("searchContainer");
const searchInput = document.getElementById("searchInput");
const modal = document.getElementById("modal");
const mName = document.getElementById("mName");
const mRole = document.getElementById("mRole");
const mDesc = document.getElementById("mDesc");
const mAvatar = document.getElementById("mAvatar");
const close = document.getElementById("close");

// INTRO SEQUENCE
intro.addEventListener("click", () => {
  intro.classList.add("hide");
  searchContainer.style.display = "block";

  cards.forEach((card, i) => {
    setTimeout(() => {
      card.classList.add("revealed");
      typeWriter(card.querySelector('.name'));
      setTimeout(() => card.classList.add("unlocked"), 500);
    }, i * 175);
  });

  setTimeout(() => intro.remove(), 1200);
});

// 3D CARD FLIP
cards.forEach(card => {
  card.addEventListener("click", (e) => {
    e.stopPropagation();
    card.classList.toggle("flipped");
    
    setTimeout(() => {
      if (card.classList.contains("flipped")) {
        // Flip back after 2s
        setTimeout(() => card.classList.remove("flipped"), 2000);
      }
    }, 300);
  });
});

// TYPEWRITER EFFECT
function typeWriter(element) {
  const text = element.getAttribute('data-text');
  element.textContent = '';
  let i = 0;
  
  function type() {
    if (i < text.length) {
      element.textContent += text.charAt(i);
      i++;
      setTimeout(type, 80 + Math.random() * 50);
    }
  }
  type();
}

// SEARCH FUNCTIONALITY
searchInput.addEventListener("input", (e) => {
  const query = e.target.value.toLowerCase();
  
  cards.forEach(card => {
    const name = card.dataset.name.toLowerCase();
    const role = card.dataset.role.toLowerCase();
    
    if (name.includes(query) || role.includes(query)) {
      card.classList.remove("hidden");
    } else {
      card.classList.add("hidden");
    }
  });
});

// ESCAPE SEARCH
searchInput.addEventListener("blur", () => {
  setTimeout(() => {
    if (!searchInput.value) {
      cards.forEach(card => card.classList.remove("hidden"));
    }
  }, 200);
});

// MODAL (unchanged)
cards.forEach(card => {
  card.addEventListener("dblclick", (e) => {
    if (!card.classList.contains("flipped")) {
      const nameEl = card.querySelector(".name");
      const roleEl = card.querySelector(".role");
      const descEl = card.querySelector(".desc");
      const avatarEl = card.querySelector(".avatar");
      
      mName.innerText = nameEl.innerText;
      mRole.innerText = roleEl.innerText;
      mDesc.innerText = descEl.innerText;
      mAvatar.style.backgroundImage = avatarEl.style.backgroundImage;
      modal.classList.add("show");
    }
  });
});

close.addEventListener("click", () => modal.classList.remove("show"));
modal.addEventListener("click", (e) => {
  if (e.target === modal) modal.classList.remove("show");
});

// Smooth scroll to search on focus
searchInput.addEventListener("focus", () => {
  searchContainer.scrollIntoView({ behavior: "smooth", block: "center" });
});
</script>

</body>
</html>
