<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ℭ-oas | Detective Board</title>
    <style>
        /* --- FONTS & RESET --- */
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime&family=UnifrakturMaguntia&family=Pinyon+Script&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a1a1a;
            font-family: 'Courier Prime', monospace;
            color: #e0e0e0;
            overflow-x: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* --- INTRO SCREEN --- */
        #intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #111;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 1s ease;
            cursor: pointer;
        }

        #intro-screen h1 {
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: 6rem;
            color: #8a0b0b;
            text-shadow: 0 0 10px #8a0b0b;
            animation: pulse 2s infinite;
        }

        #intro-screen p {
            margin-top: 20px;
            font-size: 1.2rem;
            color: #555;
            letter-spacing: 5px;
            text-transform: uppercase;
            animation: blink 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* --- MAIN BOARD --- */
        #board-container {
            display: none; /* Hidden initially */
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #5a4d3d 20%, #2e261f 100%); /* Cork texture feel */
            position: relative;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            padding: 50px;
            overflow-y: auto;
        }

        /* String overlay (SVG) */
        #string-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .red-string {
            stroke: #d40000;
            stroke-width: 3;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawString 2s forwards;
            opacity: 0.7;
        }

        @keyframes drawString {
            to { stroke-dashoffset: 0; }
        }

        /* --- WANTED POSTERS --- */
        .poster-container {
            z-index: 2;
            margin: 20px;
            position: relative;
            width: 220px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* The Interactive Hover Effect */
        .poster-container:hover {
            transform: scale(1.1) !important;
        }

        .wanted-poster {
            background: #f0e6d2; /* Old paper color */
            color: #1a1a1a;
            border: 1px solid #aaa;
            padding: 10px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
            transform: rotate(-2deg);
            text-align: center;
        }
        
        /* Stagger rotation for natural look */
        .poster-container:nth-child(even) .wanted-poster {
            transform: rotate(2deg);
        }
        
        .poster-container:hover .wanted-poster {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            border: 2px solid #333;
        }

        .poster-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            filter: grayscale(60%) sepia(20%);
            border: 2px solid #000;
            margin-bottom: 10px;
            background: #333;
        }

        .wanted-title {
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: 2rem;
            margin-bottom: 5px;
            border-bottom: 2px solid #000;
        }

        .case-file-text {
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        
        .status-stamp {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #8a0b0b;
            border: 4px solid #8a0b0b;
            padding: 5px 10px;
            font-family: 'Pinyon Script', cursive;
            font-size: 1.5rem;
            transform: rotate(15deg);
            opacity: 0.8;
        }

        /* --- MODAL / DETAIL VIEW --- */
        #detail-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #e8e1d5;
            color: #000;
            width: 500px;
            max-width: 90%;
            padding: 40px;
            position: relative;
            font-family: 'Courier Prime', monospace;
            box-shadow: 0 0 50px #000;
            text-align: center;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
        }

        .modal-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #000;
            object-fit: cover;
            margin-bottom: 20px;
        }

        .typewriter-text {
            font-size: 1.2rem;
            min-height: 60px;
            margin-bottom: 30px;
            font-style: italic;
        }

        /* Hidden Links Area */
        .hidden-links {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .fake-link {
            background: #000;
            color: #fff;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 0.9rem;
            border: none;
            transition: all 0.2s;
        }

        .fake-link:hover {
            background: #8a0b0b;
        }

        /* Close Button */
        .close-btn {
            position: absolute;
            top: -20px;
            right: -20px;
            background: #fff;
            border: 3px solid #000;
            width: 40px;
            height: 40px;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            transition: transform 0.3s ease;
        }

        .close-btn:hover {
            transform: rotate(90deg); /* Turns sideways */
            background: #8a0b0b;
            color: white;
            border-color: white;
        }

    </style>
</head>
