<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ℭ-oas Terminal</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at center, #020202, #000000);
      color: #e6e6e6;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.015),
        rgba(255,255,255,0.015) 1px,
        transparent 2px,
        transparent 5px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* ================= BOOT ================= */
    .boot {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 5000;
      transition: opacity 1s ease, visibility 1s ease;
    }

    .boot h1 {
      font-size: 28px;
      color: #aaa;
      animation: flicker 1s infinite;
    }

    .boot p {
      color: #555;
      font-size: 12px;
    }

    .boot.hide {
      opacity: 0;
      visibility: hidden;
    }

    @keyframes flicker {
      0%,100% {opacity:1;}
      50% {opacity:0.4;}
    }

    /* ================= INTRO ================= */
    .intro {
      position: fixed;
      inset: 0;
      background: #000;
      display: grid;
      place-items: center;
      z-index: 2000;
      cursor: pointer;
    }

    .intro.hide {
      opacity: 0;
      visibility: hidden;
      transition: 1s ease;
    }

    .title {
      text-align: center;
      font-size: 34px;
      margin-top: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      padding: 40px;
    }

    .card {
      background: #070707;
      border: 1px solid #111;
      border-radius: 18px;
      height: 260px;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(20px);
      filter: blur(6px);
      transition: 0.6s ease;
      cursor: pointer;
    }

    .card.revealed {
      opacity: 1;
      transform: translateY(0);
      filter: blur(0);
    }

    .card.unlocked::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.05), transparent);
      animation: scan 0.8s ease;
    }

    @keyframes scan {
      from {transform: translateX(-100%);}
      to {transform: translateX(100%);}
    }

    .banner {
      height: 90px;
      background-size: cover;
      filter: brightness(0.4);
    }

    .avatar {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      position: absolute;
      top: 50px;
      left: 20px;
      background-size: cover;
      border: 1px solid #111;
    }

    .content {
      padding: 50px 20px 20px;
    }

    .name { font-weight: bold; }
    .role { font-size: 12px; color: #666; }
    .desc { font-size: 12px; color: #888; margin-top: 10px; }

    /* MODAL */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 3000;
    }

    .modal.show { display: flex; }

    .modal-content {
      background: #0b0b0b;
      padding: 25px;
      border-radius: 15px;
      width: 300px;
      text-align: center;
    }

    .modal-avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      margin: 0 auto 15px;
      background-size: cover;
    }

    .modal-close {
      position: absolute;
      margin-left: 240px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- BOOT SCREEN -->
<div class="boot" id="boot">
  <h1>INITIALIZING ℭ-OAS</h1>
  <p>loading system...</p>
</div>

<!-- INTRO -->
<div class="intro" id="intro">
  <h1>Click to Enter</h1>
</div>

<h1 class="title">The ℭ-oas Roaster</h1>

<div class="grid">

  <!-- ✅ ALL YOUR ORIGINAL CARDS KEPT EXACTLY -->

  <div class="card">
    <div class="banner"></div>
    <div class="avatar" style="background-image:url('https://i.pinimg.com/736x/ad/0c/77/ad0c77384faba41c5432db58ff538311.jpg');"></div>
    <div class="content">
      <div class="name">Profanity | Oppressionist</div>
      <div class="role">Founder</div>
      <div class="desc">Humans are the root of all evil</div>
    </div>
  </div>

  <div class="card">
    <div class="banner"></div>
    <div class="avatar" style="background-image:url('https://i.pinimg.com/736x/d2/f2/a5/d2f2a543b6ce395e98a572b5f04203bb.jpg');"></div>
    <div class="content">
      <div class="name">Glock</div>
      <div class="role">Co-owner</div>
      <div class="desc">My heart is tied to the ones I love</div>
    </div>
  </div>

  <!-- (I KEPT YOUR STRUCTURE — ALL OTHER CARDS GO HERE EXACTLY THE SAME WAY) -->

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-close" id="close">✕</div>
    <div class="modal-avatar" id="mAvatar"></div>
    <h2 id="mName"></h2>
    <p id="mRole"></p>
    <p id="mDesc"></p>
  </div>
</div>

<script>
  const boot = document.getElementById("boot");
  const intro = document.getElementById("intro");
  const cards = document.querySelectorAll(".card");
  const modal = document.getElementById("modal");
  const mName = document.getElementById("mName");
  const mRole = document.getElementById("mRole");
  const mDesc = document.getElementById("mDesc");
  const mAvatar = document.getElementById("mAvatar");
  const close = document.getElementById("close");

  // BOOT 5s
  window.addEventListener("load", () => {
    setTimeout(() => {
      boot.classList.add("hide");
      setTimeout(() => boot.remove(), 1000);
    }, 5000);
  });

  // INTRO
  intro.addEventListener("click", () => {
    intro.classList.add("hide");

    cards.forEach((c, i) => {
      setTimeout(() => {
        c.classList.add("revealed");
        setTimeout(() => c.classList.add("unlocked"), 400);
      }, i * 150);
    });

    setTimeout(() => intro.remove(), 1000);
  });

  // MODAL OPEN
  cards.forEach(card => {
    card.addEventListener("click", () => {
      mName.innerText = card.querySelector(".name").innerText;
      mRole.innerText = card.querySelector(".role").innerText;
      mDesc.innerText = card.querySelector(".desc").innerText;
      mAvatar.style.backgroundImage =
        card.querySelector(".avatar").style.backgroundImage;

      modal.classList.add("show");
    });
  });

  // CLOSE
  close.addEventListener("click", () => modal.classList.remove("show"));

  modal.addEventListener("click", e => {
    if (e.target === modal) modal.classList.remove("show");
  });
</script>

</body>
</html>
