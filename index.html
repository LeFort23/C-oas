<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ℭ-oas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Cinzel:wght@400;600&display=swap');

body {
  margin: 0;
  overflow: hidden;
  font-family: 'Cinzel', serif;
  background: #000;
  color: #e6e6e6;
}

/* INTRO */
#intro {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle, #0a0a0a, #000);
  z-index: 999;
}

#intro h1 {
  font-size: 60px;
  letter-spacing: 4px;
}

#proceed {
  margin-top: 20px;
  font-family: 'Special Elite', monospace;
  cursor: pointer;
  color: #888;
}
#proceed:hover { color: #fff; }

/* BOARD */
#board {
  position: absolute;
  inset: 0;
  display: none;

  /* YOUR IMAGE HERE */
  background: url("/mnt/data/bf309fa1-c105-42a7-8bd1-658fb4c4d779.png") center/cover no-repeat;
}

/* DARK OVERLAY FOR SINISTER FEEL */
#board::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.65);
}

/* LINES */
svg {
  position: absolute;
  inset: 0;
  z-index: 1;
}

line {
  stroke: rgba(255,0,0,0.25);
  stroke-width: 2;
}

/* CASE FILES */
.case {
  position: absolute;
  width: 140px;
  text-align: center;
  cursor: pointer;
  z-index: 2;
  transition: 0.2s;
}

.case:hover {
  transform: scale(1.08);
}

.case img {
  width: 100%;
  border-radius: 6px;
  border: 1px solid #333;
  filter: grayscale(0.2) contrast(1.1);
}

.case span {
  display: block;
  margin-top: 5px;
  font-size: 12px;
  color: #bbb;
}

/* POPUP */
#popup {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#popup-content {
  width: 520px;
  background: #0a0a0a;
  border: 1px solid #333;
  padding: 20px;
  position: relative;
}

#close {
  position: absolute;
  right: 15px;
  top: 10px;
  cursor: pointer;
  transition: 0.3s;
}

#close:hover {
  transform: rotate(90deg);
}

#popup img {
  width: 120px;
  border-radius: 6px;
  margin-bottom: 10px;
}

#quote {
  font-family: 'Special Elite', monospace;
  min-height: 60px;
  color: #ccc;
}

.links a {
  display: block;
  margin-top: 6px;
  color: #444;
  letter-spacing: 2px;
  text-decoration: none;
}

.links a:hover {
  color: #fff;
}
</style>
</head>

<body>

<div id="intro">
  <h1>ℭ-oas</h1>
  <div id="proceed">proceed</div>
</div>

<div id="board">

<svg id="lines"></svg>

<div class="case" style="top:120px; left:200px;"
data-name="Vex"
data-quote="Truth is never found... only uncovered."
data-img="https://i.pravatar.cc/200?img=12"
data-links="alpha.com,beta.com,gamma.com">
<img src="https://i.pravatar.cc/200?img=12">
<span>Case Vex</span>
</div>

<div class="case" style="top:320px; left:520px;"
data-name="Nyx"
data-quote="I was never missing. I was hiding."
data-img="https://i.pravatar.cc/200?img=32"
data-links="one.com,two.com,three.com">
<img src="https://i.pravatar.cc/200?img=32">
<span>Case Nyx</span>
</div>

<div class="case" style="top:180px; left:820px;"
data-name="Orion"
data-quote="Every answer creates another question."
data-img="https://i.pravatar.cc/200?img=45"
data-links="red.com,blue.com,green.com">
<img src="https://i.pravatar.cc/200?img=45">
<span>Case Orion</span>
</div>

</div>

<div id="popup">
  <div id="popup-content">
    <div id="close">✕</div>
    <img id="pimg">
    <div id="quote"></div>

    <div class="links">
      <a id="l1">DONT</a>
      <a id="l2">LET</a>
      <a id="l3">Go</a>
    </div>
  </div>
</div>

<script>
const intro = document.getElementById("intro");
const board = document.getElementById("board");
const cases = document.querySelectorAll(".case");
const popup = document.getElementById("popup");
const quoteBox = document.getElementById("quote");
const img = document.getElementById("pimg");

document.getElementById("proceed").onclick = () => {
  intro.style.display = "none";
  board.style.display = "block";
  drawLines();
};

function typeWriter(text) {
  quoteBox.innerHTML = "";
  let i = 0;
  let t = setInterval(() => {
    quoteBox.innerHTML += text[i];
    i++;
    if (i >= text.length) clearInterval(t);
  }, 30);
}

cases.forEach(c => {
  c.onclick = () => {
    popup.style.display = "flex";
    img.src = c.dataset.img;
    typeWriter(c.dataset.quote);

    let links = c.dataset.links.split(",");
    document.getElementById("l1").href = "https://" + links[0];
    document.getElementById("l2").href = "https://" + links[1];
    document.getElementById("l3").href = "https://" + links[2];
  };
});

document.getElementById("close").onclick = () => {
  popup.style.display = "none";
  quoteBox.innerHTML = "";
};

function drawLines() {
  const svg = document.getElementById("lines");

  cases.forEach((c1, i) => {
    cases.forEach((c2, j) => {
      if (j > i) {
        let r1 = c1.getBoundingClientRect();
        let r2 = c2.getBoundingClientRect();

        let line = document.createElementNS("http://www.w3.org/2000/svg","line");
        line.setAttribute("x1", r1.left + r1.width/2);
        line.setAttribute("y1", r1.top + r1.height/2);
        line.setAttribute("x2", r2.left + r2.width/2);
        line.setAttribute("y2", r2.top + r2.height/2);

        svg.appendChild(line);
      }
    });
  });
}
</script>

</body>
</html>
