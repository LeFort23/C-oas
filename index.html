<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ℭ-oas Terminal</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:wght@400;700&family=Cinzel:wght@400;500;700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'IM Fell English', serif;
      background: #000;
      color: #b30000;
      overflow-x: hidden;
      position: relative;
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: 
        repeating-linear-gradient(
          to bottom,
          rgba(139,0,0,0.03) 0px,
          rgba(139,0,0,0.03) 1px,
          transparent 2px,
          transparent 6px
        ),
        radial-gradient(ellipse at 20% 80%, rgba(178,34,34,0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 999;
      animation: bloodPulse 8s ease-in-out infinite;
    }

    @keyframes bloodPulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(circle at 30% 20%, rgba(139,0,0,0.08) 0%, transparent 40%),
        radial-gradient(circle at 70% 80%, rgba(178,34,34,0.06) 0%, transparent 50%),
        radial-gradient(circle at center, transparent 40%, rgba(0,0,0,1) 100%);
      pointer-events: none;
      z-index: 998;
    }

    body.glitch::before {
      animation: glitch 0.3s linear infinite;
    }

    @keyframes glitch {
      0%, 100% { transform: translate(0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(-2px, -2px); }
      60% { transform: translate(2px, 2px); }
      80% { transform: translate(2px, -2px); }
    }

    /* ══ Intro Screen ══ */
    .intro {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, #1a0000, #000);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      z-index: 2000;
      cursor: pointer;
    }

    .intro h1 {
      font-size: 56px;
      font-weight: 700;
      font-family: 'Cinzel', serif;
      color: #ff4444;
      letter-spacing: 8px;
      text-shadow: 
        0 0 20px #8b0000,
        0 0 40px #b30000,
        0 0 60px #8b0000,
        2px 2px 0 #000,
        -2px -2px 0 #000;
      border-bottom: 3px solid #8b0000;
      padding-bottom: 15px;
      position: relative;
      animation: bloodDrip 4s ease-in-out infinite;
    }

    .intro h1::after {
      content: "";
      position: absolute;
      bottom: -10px;
      left: 0;
      right: 0;
      height: 8px;
      background: linear-gradient(90deg, transparent, #8b0000, transparent);
      animation: bloodFlow 3s linear infinite;
    }

    @keyframes bloodDrip {
      0%, 100% { 
        text-shadow: 0 0 20px #8b0000, 0 0 40px #b30000, 0 0 60px #8b0000;
        transform: scale(1);
      }
      50% { 
        text-shadow: 0 0 30px #ff0000, 0 0 60px #ff4444, 0 0 90px #8b0000;
        transform: scale(1.02);
      }
    }

    @keyframes bloodFlow {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .intro p {
      color: #660000;
      margin-top: 30px;
      font-size: 18px;
      letter-spacing: 4px;
      text-shadow: 0 0 10px #8b0000;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    .intro.hide {
      opacity: 0;
      visibility: hidden;
      transition: opacity 3s ease, visibility 3s ease;
      pointer-events: none;
    }

    /* ══ Title ══ */
    .title {
      text-align: center;
      font-size: 44px;
      font-weight: 700;
      font-family: 'Cinzel', serif;
      margin: 80px 0 100px;
      color: #ff4444;
      letter-spacing: 6px;
      text-shadow: 
        0 0 15px #8b0000,
        2px 2px 0 #000,
        -2px -2px 0 #000;
      position: relative;
    }

    .title::after {
      content: "Not Here But Never Gone";
      position: absolute;
      bottom: -25px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: #660000;
      letter-spacing: 2px;
      text-shadow: 0 0 10px #8b0000;
      animation: flicker 3s linear infinite;
    }

    @keyframes flicker {
      0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
      20%, 24%, 55% { opacity: 0.3; }
    }

    /* ══ Main Grid ══ */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 35px;
      padding: 60px;
      max-width: 1500px;
      margin: 0 auto;
    }

    /* ══ Card Styles ══ */
    .card {
      background: linear-gradient(160deg, #0a0000, #1a000a);
      border: 1px solid rgba(139,0,0,0.4);
      border-radius: 0;
      height: 300px;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(50px) scale(0.95);
      transition: all 1.2s cubic-bezier(0.22, 0.44, 0.38, 0.94);
      cursor: pointer;
      box-shadow: 
        0 20px 40px rgba(139,0,0,0.4),
        inset 0 1px 0 rgba(139,0,0,0.1);
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, 
        transparent, 
        #ff4444, 
        #8b0000,
        transparent
      );
      animation: bloodSweep 3s linear infinite;
      box-shadow: 0 0 10px #8b0000;
    }

    @keyframes bloodSweep {
      0% { transform: translateX(-100%) scaleX(0.5); }
      50% { transform: translateX(0) scaleX(1.2); }
      100% { transform: translateX(100%) scaleX(0.5); }
    }

    .card.revealed {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .card.unlocked {
      border-color: #ff4444;
      box-shadow: 
        0 30px 60px rgba(139,0,0,0.6),
        0 0 40px rgba(139,0,0,0.4),
        inset 0 1px 0 rgba(139,0,0,0.2);
      animation: unlockPulse 1s ease-out;
    }

    @keyframes unlockPulse {
      0% { box-shadow: 0 30px 60px rgba(139,0,0,0.6), 0 0 40px rgba(139,0,0,0.4); }
      50% { box-shadow: 0 30px 60px rgba(255,68,68,0.8), 0 0 60px rgba(139,0,0,0.8); }
      100% { box-shadow: 0 30px 60px rgba(139,0,0,0.6), 0 0 40px rgba(139,0,0,0.4); }
    }

    .card:hover {
      transform: translateY(-15px) scale(1.02);
      border-color: #ff6666;
      box-shadow: 
        0 40px 80px rgba(139,0,0,0.8),
        0 0 60px rgba(139,0,0,0.6),
        inset 0 2px 10px rgba(139,0,0,0.2);
      background: linear-gradient(160deg, #150000, #25000a);
    }

    .banner {
      height: 110px;
      background: linear-gradient(to bottom, 
        rgba(10,0,0,0.95), 
        rgba(26,0,10,1)
      );
      position: relative;
      border-bottom: 2px solid rgba(139,0,0,0.6);
    }

    .banner::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url('https://i.pinimg.com/originals/13/56/e5/1356e5ff229a2270742a7b83cac46e83.gif');
      background-size: cover;
      opacity: 0.15;
      filter: grayscale(1) sepia(0.8) brightness(0.5) contrast(1.5);
      mix-blend-mode: multiply;
    }

    .avatar {
      width: 85px;
      height: 85px;
      border-radius: 4px;
      position: absolute;
      top: 60px;
      left: 25px;
      background-size: cover;
      border: 3px solid #8b0000;
      box-shadow: 
        inset 0 0 20px rgba(0,0,0,0.9),
        0 0 20px rgba(139,0,0,0.6),
        2px 2px 0 #000;
      transition: all 0.5s ease;
      filter: contrast(1.2) saturate(0.8);
    }

    .card:hover .avatar {
      border-color: #ff4444;
      box-shadow: 
        inset 0 0 25px rgba(0,0,0,1),
        0 0 35px rgba(139,0,0,0.9),
        2px 2px 0 #000;
      transform: scale(1.1) rotate(2deg);
      filter: contrast(1.4) saturate(1);
    }

    .content {
      padding: 60px 30px 30px;
    }

    .name {
      font-size: 23px;
      font-weight: 700;
      font-family: 'Cinzel', serif;
      color: #ff4444;
      margin-bottom: 8px;
      letter-spacing: 2px;
      text-shadow: 
        0 0 10px #8b0000,
        2px 2px 0 #000;
    }

    .role {
      font-size: 13px;
      color: #990000;
      text-transform: uppercase;
      letter-spacing: 4px;
      opacity: 0.95;
      text-shadow: 0 0 8px #8b0000;
      font-weight: 700;
    }

    .desc {
      font-size: 14px;
      color: #660000;
      margin-top: 16px;
      line-height: 1.5;
      font-style: italic;
      position: relative;
      text-shadow: 0 0 5px rgba(139,0,0,0.5);
    }

    .desc::before {
      content: "† ";
      color: #8b0000;
      text-shadow: 0 0 8px #8b0000;
      animation: daggerTwitch 4s ease-in-out infinite;
    }

    @keyframes daggerTwitch {
      0%, 90%, 100% { transform: rotate(0deg); }
      5% { transform: rotate(-5deg); }
      15% { transform: rotate(3deg); }
      25% { transform: rotate(-2deg); }
    }

    /* ══ Modal ══ */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.98);
      backdrop-filter: blur(15px) saturate(0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 3000;
    }

    .modal.show {
      display: flex;
      animation: modalRise 0.8s cubic-bezier(0.22, 0.44, 0.38, 0.94);
    }

    @keyframes modalRise {
      from {
        opacity: 0;
        transform: translateY(100px) scale(0.8);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .modal-content {
      background: linear-gradient(160deg, #100000, #200
