<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ℭ-oas Terminal</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at center, #020202, #000000);
  color: #e6e6e6;
  overflow-x: hidden;
}

/* scanlines */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.015),
    rgba(255,255,255,0.015) 1px,
    transparent 2px,
    transparent 5px
  );
  pointer-events: none;
  z-index: 999;
}

/* ================= BOOT SCREEN ================= */
.boot{
  position:fixed;
  inset:0;
  background:#000;
  z-index:5000;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

.boot::after{
  content:"";
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.03),
    rgba(255,255,255,0.03) 1px,
    transparent 2px,
    transparent 4px
  );
  pointer-events:none;
}

.boot-text{
  font-family: monospace;
  font-size:14px;
  color:#8a8a8a;
  white-space:pre-line;
  width:400px;
  line-height:1.7;
  text-shadow:0 0 8px rgba(255,255,255,0.15);
}

.loading-bar{
  width:100%;
  height:4px;
  background:#111;
  margin-top:15px;
  overflow:hidden;
  border-radius:5px;
}

.loading-fill{
  height:100%;
  width:0%;
  background:#888;
  animation:loadBar 5s linear forwards;
}

@keyframes loadBar{
  from{
    width:0%;
  }
  to{
    width:100%;
  }
}

/* ================= INTRO ================= */
.intro {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at center, rgba(255,255,255,0.03), transparent 60%),
    #000;
  display: grid;
  place-items: center;
  text-align: center;
  z-index: 2000;
  cursor: pointer;
  overflow: hidden;

  opacity:0;
  transition:1s ease;
}

/* cinematic bars */
.intro::before,
.intro::after{
  content:"";
  position:absolute;
  left:0;
  width:100%;
  height:70px;
  background:#000;
  z-index:5;
}

.intro::before{
  top:0;
}

.intro::after{
  bottom:0;
}

/* particles */
.particles{
  position:absolute;
  inset:0;
  background-image:
    radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);
  background-size:3px 3px;
  opacity:0.08;
  animation:drift 20s linear infinite;
}

/* flicker */
.flicker{
  position:absolute;
  inset:0;
  background:rgba(255,255,255,0.02);
  mix-blend-mode:overlay;
  animation:flicker 0.15s infinite;
  pointer-events:none;
}

.intro h1 {
  font-size: 42px;
  margin: 0;
  letter-spacing: 4px;

  background: linear-gradient(90deg, #666, #ddd, #666);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  animation:
    fadeUp 2s ease,
    glow 4s infinite alternate;
}

.intro p {
  color: #555;
  margin-top: 15px;
  letter-spacing: 2px;
  animation: blink 1.2s infinite;
}

.intro.hide {
  opacity: 0;
  visibility: hidden;
  transition: 1s ease;
}

/* ================= TITLE ================= */
.title {
  text-align: center;
  font-size: 34px;
  margin-top: 30px;
  background: linear-gradient(90deg, #555, #aaa, #555);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ================= GRID ================= */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  padding: 40px;
}

/* ================= CARDS ================= */
.card {
  background: #070707;
  border: 1px solid #111;
  border-radius: 18px;
  height: 260px;
  position: relative;
  overflow: hidden;

  opacity: 0;
  transform: translateY(20px);
  filter: blur(6px);

  transition: 0.6s ease, transform 0.25s ease;
  cursor: pointer;
}

.card.revealed {
  opacity: 1;
  transform: translateY(0);
  filter: blur(0);
}

.card.unlocked::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.05), transparent);
  animation: scan 0.8s ease;
}

.card:hover {
  transform: translateY(-6px) scale(1.02);
}

/* animations */
@keyframes scan {
  from { transform: translateX(-100%); }
  to { transform: translateX(100%); }
}

@keyframes flicker{
  0%{opacity:.2;}
  50%{opacity:.05;}
  100%{opacity:.15;}
}

@keyframes glow{
  from{
    filter:drop-shadow(0 0 5px rgba(255,255,255,0.1));
  }
  to{
    filter:drop-shadow(0 0 18px rgba(255,255,255,0.25));
  }
}

@keyframes drift{
  from{
    transform:translateY(0);
  }
  to{
    transform:translateY(-200px);
  }
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(30px) scale(.95);
    filter:blur(10px);
  }
  to{
    opacity:1;
    transform:translateY(0) scale(1);
    filter:blur(0);
  }
}

@keyframes blink{
  50%{
    opacity:.3;
  }
}

/* banner */
.banner {
  height: 90px;
  background: url('https://i.pinimg.com/originals/13/56/e5/1356e5ff229a2270742a7b83cac46e83.gif');
  background-size: cover;
  filter: brightness(0.4);
}

/* avatar */
.avatar {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  position: absolute;
  top: 50px;
  left: 20px;
  background-size: cover;
  border: 1px solid #111;
}

/* content */
.content {
  padding: 50px 20px 20px;
}

.name { font-size: 18px; font-weight: bold; color: #ddd; }
.role { font-size: 12px; color: #666; }
.desc { font-size: 12px; color: #888; margin-top: 10px; }

/* ================= MODAL ================= */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 3000;
}

.modal.show {
  display: flex;
}

.modal-content {
  background: #0b0b0b;
  border: 1px solid #1a1a1a;
  padding: 25px;
  border-radius: 15px;
  width: 300px;
  text-align: center;
}

.modal-avatar {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  margin: 0 auto 15px;
  background-size: cover;
  border: 1px solid #222;
}

.modal-close {
  position: absolute;
  margin-left: 240px;
  cursor: pointer;
  color: #aaa;
}
</style>
</head>

<body>

<!-- BOOT -->
<div class="boot" id="boot">
  <div class="boot-text" id="bootText"></div>
</div>

<!-- INTRO -->
<div class="intro" id="intro">

  <div class="particles"></div>
  <div class="flicker"></div>

  <div>
    <h1>Welcome to the ℭ-oas Roaster</h1>
    <p>[ CLICK TO ENTER ]</p>
  </div>

</div>

<h1 class="title">The ℭ-oas Roaster</h1>

<div class="grid">

  <div class="card"><div class="banner"></div><div class="avatar" style="background-image:url('https://i.pinimg.com/736x/ad/0c/77/ad0c77384faba41c5432db58ff538311.jpg');"></div><div class="content"><div class="name">Profanity | Oppressionist</div><div class="role">Founder</div><div class="desc">Humans are the root of all evil</div></div></div>

  <div class="card"><div class="banner"></div><div class="avatar" style="background-image:url('https://i.pinimg.com/736x/d2/f2/a5/d2f2a543b6ce395e98a572b5f04203bb.jpg');"></div><div class="content"><div class="name">Glock</div><div class="role">Co-owner</div><div class="desc">My heart is tied to the ones I love</div></div></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-close" id="close">✕</div>
    <div class="modal-avatar" id="mAvatar"></div>
    <h2 id="mName"></h2>
    <p id="mRole"></p>
    <p id="mDesc"></p>
  </div>
</div>

<script>
const intro = document.getElementById("intro");
const cards = document.querySelectorAll(".card");

const modal = document.getElementById("modal");
const mName = document.getElementById("mName");
const mRole = document.getElementById("mRole");
const mDesc = document.getElementById("mDesc");
const mAvatar = document.getElementById("mAvatar");
const close = document.getElementById("close");

/* ================= BOOT ================= */

const boot = document.getElementById("boot");
const bootText = document.getElementById("bootText");

const lines = [
  "[ SYSTEM ] Initializing ℭ-oas...",
  "[ SYSTEM ] Connecting to archive...",
  "[ SYSTEM ] Verifying members...",
  "[ WARNING ] Unauthorized access prohibited",
  "[ SYSTEM ] Loading interface...",
  "[ OK ] Access granted."
];

let i = 0;

function typeLine(){

  if(i < lines.length){

    bootText.innerHTML += lines[i] + "\n";

    i++;

    setTimeout(typeLine, 900);

  } else {

    bootText.innerHTML += `
      <div class="loading-bar">
        <div class="loading-fill"></div>
      </div>
    `;

    setTimeout(()=>{

      boot.style.opacity = "0";
      boot.style.transition = "1s ease";

      setTimeout(()=>{
        boot.remove();
        intro.style.opacity = "1";
      },1000);

    },5200);
  }
}

typeLine();

/* ================= INTRO ================= */

intro.addEventListener("click",()=>{

  intro.classList.add("hide");

  cards.forEach((c,i)=>{
    setTimeout(()=>{
      c.classList.add("revealed");
      setTimeout(()=>c.classList.add("unlocked"),400);
    },i*150);
  });

  setTimeout(()=>intro.remove(),1000);
});

/* ================= MODAL ================= */

cards.forEach(card=>{
  card.addEventListener("click",()=>{

    mName.innerText = card.querySelector(".name").innerText;
    mRole.innerText = card.querySelector(".role").innerText;
    mDesc.innerText = card.querySelector(".desc").innerText;
    mAvatar.style.backgroundImage =
      card.querySelector(".avatar").style.backgroundImage;

    modal.classList.add("show");
  });
});

close.addEventListener("click",()=>{
  modal.classList.remove("show");
});

modal.addEventListener("click",(e)=>{
  if(e.target === modal){
    modal.classList.remove("show");
  }
});
</script>

</body>
</html>
