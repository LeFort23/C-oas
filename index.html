<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ℭ-OAS // CORRUPTED ARCHIVE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ===========================
   GLOBAL RESET + BASE
=========================== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Courier New", monospace;
}

body {
  background: radial-gradient(circle at center, #050505, #000000);
  color: #cfcfcf;
  overflow-x: hidden;
}

/* ===========================
   SCANLINES + NOISE OVERLAY
=========================== */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.03),
    rgba(255,255,255,0.03) 1px,
    transparent 2px,
    transparent 4px
  );
  pointer-events: none;
  z-index: 9999;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: url('https://grainy-gradients.vercel.app/noise.svg');
  opacity: 0.08;
  pointer-events: none;
  z-index: 9998;
}

/* ===========================
   INTRO SCREEN
=========================== */
#intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 10000;
}

#intro h1 {
  font-size: 60px;
  letter-spacing: 10px;
  color: #b30000;
  text-shadow: 0 0 20px #ff0000;
}

#intro p {
  margin-top: 20px;
  letter-spacing: 5px;
  cursor: pointer;
  color: #777;
}

/* ===========================
   ARCHIVE LAYOUT
=========================== */
#archive {
  display: none;
  padding: 40px;
}

#title {
  text-align: center;
  font-size: 40px;
  letter-spacing: 12px;
  color: #8b0000;
  margin-bottom: 40px;
  text-shadow: 0 0 10px #ff0000;
}

/* ===========================
   DETECTIVE BOARD
=========================== */
.board {
  position: relative;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 30px;
}

.card {
  background: rgba(10,10,10,0.9);
  border: 1px solid #2a0000;
  padding: 15px;
  position: relative;
  transition: 0.3s;
  cursor: pointer;
  box-shadow: 0 0 10px rgba(255,0,0,0.1);
}

.card:hover {
  transform: scale(1.03);
  box-shadow: 0 0 20px rgba(255,0,0,0.3);
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border: 1px solid #3a0000;
}

.username {
  margin-top: 10px;
  font-size: 18px;
  color: #ff2a2a;
}

.quote {
  margin-top: 5px;
  font-size: 12px;
  color: #aaa;
  font-style: italic;
}

/* ===========================
   RED STRING CONNECTIONS
=========================== */
.line {
  position: absolute;
  width: 2px;
  height: 100px;
  background: red;
  opacity: 0.3;
  transform-origin: top;
}

/* ===========================
   MODAL CASE FILE
=========================== */
#modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 10001;
}

#modalContent {
  width: 400px;
  background: #0a0a0a;
  border: 1px solid #300000;
  padding: 20px;
}

#modalContent h2 {
  color: red;
  margin-bottom: 10px;
}

#close {
  margin-top: 10px;
  cursor: pointer;
  color: #777;
}

/* ===========================
   GLITCH EFFECT
=========================== */
.glitch {
  animation: glitch 1s infinite;
}

@keyframes glitch {
  0% { transform: translate(0); }
  20% { transform: translate(-2px,2px); }
  40% { transform: translate(2px,-2px); }
  60% { transform: translate(-1px,1px); }
  80% { transform: translate(1px,-1px); }
  100% { transform: translate(0); }
}

</style>
</head>

<body>

<!-- ===========================
     INTRO SCREEN
=========================== -->
<div id="intro">
  <h1 class="glitch">ℭ-OAS</h1>
  <p onclick="enterSite()">PROCEED</p>
</div>

<!-- ===========================
     ARCHIVE
=========================== -->
<div id="archive">
  <div id="title">CORRUPTED CASE FILE ARCHIVE</div>
  <div class="board" id="board"></div>
</div>

<!-- ===========================
     MODAL
=========================== -->
<div id="modal">
  <div id="modalContent">
    <h2 id="mName"></h2>
    <p id="mQuote"></p>
    <p id="close" onclick="closeModal()">CLOSE FILE</p>
  </div>
</div>

<script>
/* ===========================
   MEMBER DATA
=========================== */
const members = [

name:"Profanity | Oppressionist",

},
{

},
{
name:"Glock",
quote:"The blood of my beloved is my blood",

},
{

},
{

},
{

{

];

/* ===========================
   BUILD BOARD
=========================== */
const board = document.getElementById("board");

members.forEach((m,i)=>{
  const card = document.createElement("div");
  card.className = "card";
  card.onclick = ()=>openModal(m);

  card.innerHTML = `
    <img src="${m.img}">
    <div class="username">${m.name}</div>
    <div class="quote">"${m.quote}"</div>
  `;

  board.appendChild(card);
});

/* ===========================
   INTRO CONTROL
=========================== */
function enterSite(){
  document.getElementById("intro").style.display="none";
  document.getElementById("archive").style.display="block";
}

/* ===========================
   MODAL CONTROL
=========================== */
function openModal(m){
  document.getElementById("modal").style.display="flex";
  document.getElementById("mName").innerText=m.name;
  document.getElementById("mQuote").innerText=m.quote;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* ===========================
   BACKGROUND STATIC EFFECT
=========================== */
setInterval(()=>{
  document.body.style.filter = "contrast("+(1+Math.random()*0.1)+")";
},2000);

</script>

     EXTENDED LORE / ARCHIVE PADDING (FOR DEPTH + ATMOSPHERE)
     (intentionally extended for 500+ line structure)
========================================================= -->

<style>
/* filler atmospheric layers */
.layer1{position:fixed;inset:0;opacity:.02;background:red;}

</body>
</html>
