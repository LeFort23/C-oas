<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ℭ-oas Terminal</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:wght@400;700&family=Cinzel:wght@400;500;700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'IM Fell English', serif;
      background: #000;
      color: #b30000;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(139,0,0,0.03) 0px,
          rgba(139,0,0,0.03) 1px,
          transparent 2px,
          transparent 6px
        ),
        radial-gradient(
          ellipse at 20% 80%,
          rgba(178,34,34,0.04) 0%,
          transparent 50%
        );
      pointer-events: none;
      z-index: 999;
      animation: bloodPulse 8s ease-in-out infinite;
    }

    @keyframes bloodPulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 30% 20%, rgba(139,0,0,0.08) 0%, transparent 40%),
        radial-gradient(circle at 70% 80%, rgba(178,34,34,0.06) 0%, transparent 50%),
        radial-gradient(circle at center, transparent 40%, rgba(0,0,0,1) 100%);
      pointer-events: none;
      z-index: 998;
    }

    body.glitch::before {
      animation: glitch 0.3s linear infinite;
    }

    @keyframes glitch {
      0%, 100% { transform: translate(0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(-2px, -2px); }
      60% { transform: translate(2px, 2px); }
      80% { transform: translate(2px, -2px); }
    }

    /* Intro Screen */
    .intro {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, #1a0000, #000);
      display: grid;
      place-items: center;
      text-align: center;
      z-index: 2000;
      cursor: pointer;
    }

    .intro h1 {
      font-size: 56px;
      font-weight: 700;
      font-family: 'Cinzel', serif;
      color: #ff4444;
      letter-spacing: 8px;
      text-shadow:
        0 0 20px #8b0000,
        0 0 40px #b30000,
        0 0 60px #8b0000,
        2px 2px 0 #000,
        -2px -2px 0 #000;
      border-bottom: 3px solid #8b0000;
      padding-bottom: 15px;
      position: relative;
      animation: bloodDrip 4s ease-in-out infinite;
    }

    .intro h1::after {
      content: "";
      position: absolute;
      bottom: -10px;
      left: 0;
      right: 0;
      height: 8px;
      background: linear-gradient(90deg, transparent, #8b0000, transparent);
      animation: bloodFlow 3s linear infinite;
    }

    @keyframes bloodDrip {
      0%, 100% {
        text-shadow: 0 0 20px #8b0000, 0 0 40px #b30000, 0 0 60px #8b0000;
        transform: scale(1);
      }
      50% {
        text-shadow: 0 0 30px #ff0000, 0 0 60px #ff4444, 0 0 90px #8b0000;
        transform: scale(1.02);
      }
    }

    @keyframes bloodFlow {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .intro p {
      color: #660000;
      margin-top: 30px;
      font-size: 18px;
      letter-spacing: 4px;
      text-shadow: 0 0 10px #8b0000;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    .intro.hide {
      opacity: 0;
      visibility: hidden;
      transition: 3s ease;
    }

    /* Title */
    .title {
      text-align: center;
      font-size: 44px;
      font-weight: 700;
      font-family: 'Cinzel', serif;
      margin: 80px 0 100px;
      color: #ff4444;
      letter-spacing: 6px;
      text-shadow:
        0 0 15px #8b0000,
        2px 2px 0 #000,
        -2px -2px 0 #000;
      position: relative;
    }

    .title::after {
      content: "Not Here But Never Gone";
      position: absolute;
      bottom: -25px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: #660000;
      letter-spacing: 2px;
      text-shadow: 0 0 10px #8b0000;
      animation: flicker 3s linear infinite;
    }

    @keyframes flicker {
      0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
      20%, 24%, 55% { opacity: 0.3; }
    }

    /* Main Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 35px;
      padding: 60px;
      max-width: 1500px;
      margin: 0 auto;
    }

    /* Card Styles */
    .card {
      background: linear-gradient(160deg, #0a0000, #1a000a);
      border: 1px solid rgba(139,0,0,0.4);
      height: 300px;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(50px) scale(0.95);
      transition: all 1.2s cubic-bezier(0.22, 0.44, 0.38, 0.94);
      cursor: pointer;
      box-shadow:
        0 20px 40px rgba(139,0,0,0.4),
        inset 0 1px 0 rgba(139,0,0,0.1);
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(
        90deg,
        transparent,
        #ff4444,
        #8b0000,
        transparent
      );
      animation: bloodSweep 3s linear infinite;
      box-shadow: 0 0 10px #8b0000;
    }

    @keyframes bloodSweep {
      0% { transform: translateX(-100%) scaleX(0.5); }
      50% { transform: translateX(0) scaleX(1.2); }
      100% { transform: translateX(100%) scaleX(0.5); }
    }

    .card.revealed {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .card.unlocked {
      border-color: #ff4444;
      box-shadow:
        0 30px 60px rgba(139,0,0,0.6),
        0 0 40px rgba(139,0,0,0.4),
        inset 0 1px 0 rgba(139,0,0,0.2);
      animation: unlockPulse 1s ease-out;
    }

    @keyframes unlockPulse {
      0% {
        box-shadow: 0 30px 60px rgba(139,0,0,0.6),
                    0 0 40px rgba(139,0,0,0.4);
      }
      50% {
        box-shadow: 0 30px 60px rgba(255,68,68,0.8),
                    0 0 60px rgba(139,0,0,0.8);
      }
      100% {
        box-shadow: 0 30px 60px rgba(139,0,0,0.6),
                    0 0 40px rgba(139,0,0,0.4);
      }
    }

    .card:hover {
      transform: translateY(-15px) scale(1.02);
      border-color: #ff6666;
      box-shadow:
        0 40px 80px rgba(139,0,0,0.8),
        0 0 60px rgba(139,0,0,0.6),
        inset 0 2px 10px rgba(139,0,0,0.2);
      background: linear-gradient(160deg, #150000, #25000a);
    }

    .banner {
      height: 110px;
      background: linear-gradient(to bottom,
        rgba(10,0,0,0.95),
        rgba(26,0,10,1)
      );
      position: relative;
      border-bottom: 2px solid rgba(139,0,0,0.6);
    }

    .banner::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url('https://i.pinimg.com/originals/13/56/e5/1356e5ff229a2270742a7b83cac46e83.gif');
      background-size: cover;
      opacity: 0.15;
      filter: grayscale(1) sepia(0.8) brightness(0.5) contrast(1.5);
      mix-blend-mode: multiply;
    }

    .avatar {
      width: 85px;
      height: 85px;
      border-radius: 4px;
      position: absolute;
      top: 60px;
      left: 25px;
      background-size: cover;
      background-position: center;
      border: 3px solid #8b0000;
      box-shadow:
        inset 0 0 20px rgba(0,0,0,0.9),
        0 0 20px rgba(139,0,0,0.6),
        2px 2px 0 #000;
      transition: all 0.5s ease;
      filter: contrast(1.2) saturate(0.8);
    }

    .card:hover .avatar {
      border-color: #ff4444;
      transform: scale(1.1) rotate(2deg);
    }

    .content {
      padding: 60px 30px 30px;
    }

    .name {
      font-size: 23px;
      font-weight: 700;
      font-family: 'Cinzel', serif;
      color: #ff4444;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    .role {
      font-size: 13px;
      color: #990000;
      text-transform: uppercase;
      letter-spacing: 4px;
      opacity: 0.95;
    }

    .desc {
      font-size: 14px;
      color: #660000;
      margin-top: 16px;
      line-height: 1.5;
      font-style: italic;
    }

    /* Modal */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.98);
      backdrop-filter: blur(15px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 3000;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: linear-gradient(160deg, #100000, #200008);
      border: 2px solid #8b0000;
      padding: 50px;
      width: 450px;
      text-align: center;
      position: relative;
      box-shadow:
        0 40px 100px rgba(139,0,0,0.7),
        0 0 80px rgba(139,0,0,0.4);
    }

    .modal-avatar {
      width: 140px;
      height: 140px;
      margin: 0 auto 30px;
      background-size: cover;
      background-position: center;
      border: 4px solid #8b0000;
    }

    .modal-close {
      position: absolute;
      top: 20px;
      right: 25px;
      cursor: pointer;
      color: #ff4444;
      font-size: 30px;
    }

    .modal-content h2 {
      color: #ff4444;
      font-size: 28px;
      margin-bottom: 20px;
    }

    .modal-content p {
      color: #990000;
      margin: 15px 0;
      line-height: 1.7;
    }

    /* Mute */
    #muteBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 4000;
      background: #0a0a0a;
      border: 1px solid #222;
      cursor: pointer;
      padding: 8px;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
    }

    #muteIcon {
      width: 28px;
      height: 28px;
      object-fit: contain;
    }

    /* Top Links */
    .topLinks {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 35px;
      z-index: 1500;
    }

    .topLinks a {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      color: #444;
      text-decoration: none;
      letter-spacing: 3px;
      text-transform: uppercase;
      transition: 0.3s ease;
    }

    .topLinks a:hover {
      color: #aaa;
    }

    @media(max-width:1200px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
        padding: 40px;
      }
    }

    @media(max-width:768px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 25px;
        padding: 25px;
      }

      .intro h1 {
        font-size: 40px;
      }

      .title {
        font-size: 32px;
      }

      .modal-content {
        width: 95%;
      }
    }

    @media(max-width:480px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .intro h1 {
        font-size: 32px;
      }
    }
  </style>
</head>

<body>

  <audio id="bgMusic" loop>
    <source src="https://cdn.pixabay.com/download/audio/2026/04/01/audio_ccff40b4f0.mp3?filename=atlasaudio-horror-ambience-512255.mp3" type="audio/mpeg">
  </audio>

  <button id="muteBtn">
    <img id="muteIcon" src="sound_effect.PNG" alt="Sound">
  </button>

  <!-- Top Navigation -->
  <header>
    <div class="topLinks">
      <a href="#">DONT</a>
      <a href="#">BETRAY</a>
      <a href="#">GOD</a>
    </div>
  </header>

  <!-- Intro -->
  <div class="intro" id="intro">
    <div>
      <h1>ℭ-oas Roster</h1>
      <p>Enter To View</p>
    </div>
  </div>

  <!-- Title -->
  <h1 class="title">ℭ-oas</h1>

  <!-- Grid -->
  <div class="grid">

    <div class="card" data-name="Profanity | Oppressionist" data-role="Founder" data-desc="Humans are the root of all evil">
      <div class="banner"></div>
      <div class="avatar" style="background-image:url('https://i.pinimg.com/736x/83/73/56/8373560616a827f2dacc0f646416c921.jpg');"></div>
      <div class="content">
        <div class="name">Profanity | Oppressionist</div>
        <div class="role">Founder</div>
        <div class="desc">Humans are the root of all evil</div>
      </div>
    </div>

    <div class="card" data-name="Glock" data-role="Co-Owner" data-desc="The blood of my beloved is my blood.">
      <div class="banner"></div>
      <div class="avatar" style="background-image:url('https://i.pinimg.com/736x/d2/f2/a5/d2f2a543b6ce395e98a572b5f04203bb.jpg');"></div>
      <div class="content">
        <div class="name">Glock</div>
        <div class="role">Co-Owner</div>
        <div class="desc">The blood of my beloved is my blood.</div>
      </div>
    </div>

  </div>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <div class="modal-close" id="close">†</div>

      <div class="modal-avatar" id="mAvatar"></div>

      <h2 id="mName"></h2>
      <p id="mRole"></p>
      <p id="mDesc"></p>
    </div>
  </div>

  <script>
    const intro = document.getElementById("intro");
    const cards = document.querySelectorAll(".card");
    const modal = document.getElementById("modal");

    const mName = document.getElementById("mName");
    const mRole = document.getElementById("mRole");
    const mDesc = document.getElementById("mDesc");
    const mAvatar = document.getElementById("mAvatar");

    const close = document.getElementById("close");

    const bgMusic = document.getElementById("bgMusic");

    const muteBtn = document.getElementById("muteBtn");
    const muteIcon = document.getElementById("muteIcon");

    /* Intro */
    intro.addEventListener("click", () => {

      bgMusic.volume = 0.5;

      bgMusic.play().catch(() => {});

      muteBtn.style.display = "flex";

      document.body.classList.add("glitch");

      setTimeout(() => {
        document.body.classList.remove("glitch");
      }, 1000);

      intro.classList.add("hide");

      cards.forEach((card, index) => {
        setTimeout(() => {

          card.classList.add("revealed");

          setTimeout(() => {
            card.classList.add("unlocked");
          }, 600);

        }, index * 200);
      });

      setTimeout(() => {
        intro.remove();
      }, 1500);

    });

    /* Mute Button */
    muteBtn.addEventListener("click", () => {

      bgMusic.muted = !bgMusic.muted;

      if (bgMusic.muted) {
        muteIcon.src = "mute84.PNG";
      } else {
        muteIcon.src = "sound_effect.PNG";
      }

    });

    /* Card Modal */
    cards.forEach(card => {

      card.addEventListener("click", () => {

        document.body.classList.add("glitch");

        setTimeout(() => {
          document.body.classList.remove("glitch");
        }, 300);

        mName.textContent = card.dataset.name;
        mRole.textContent = card.dataset.role;
        mDesc.textContent = card.dataset.desc;

        mAvatar.style.backgroundImage =
          card.querySelector(".avatar").style.backgroundImage;

        modal.classList.add("show");

      });

    });

    /* Close Modal */
    close.addEventListener("click", () => {
      modal.classList.remove("show");
    });

    modal.addEventListener("click", (e) => {

      if (e.target === modal) {
        modal.classList.remove("show");
      }

    });

    /* Random Glitch */
    setInterval(() => {

      if (Math.random() < 0.1) {

        document.body.classList.add("glitch");

        setTimeout(() => {
          document.body.classList.remove("glitch");
        }, 100);

      }

    }, 3000);

    /* Disable Right Click */
    document.addEventListener("contextmenu", e => {
      e.preventDefault();
    });

    /* Block DevTools */
    document.addEventListener("keydown", e => {

      if (
        e.key === "F12" ||
        (e.ctrlKey && e.shiftKey && ["I", "J", "C"].includes(e.key)) ||
        (e.ctrlKey && e.key === "U")
      ) {
        e.preventDefault();
      }

    });

  </script>

</body>
</html>
