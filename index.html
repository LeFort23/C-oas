<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ℭ-oas | Detective Board</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime&family=UnifrakturMaguntia&family=Pinyon+Script&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #111;
            font-family: 'Courier Prime', monospace;
            color: #e0e0e0;
            overflow-x: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* --- INTRO --- */
        #intro-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 1s ease;
            cursor: pointer;
        }

        #intro-screen h1 {
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: 8rem;
            color: #8a0b0b;
            text-shadow: 0 0 20px #8a0b0b;
            animation: pulse 2s infinite;
        }

        #intro-screen p {
            margin-top: 20px;
            font-size: 1.2rem;
            color: #555;
            letter-spacing: 5px;
            text-transform: uppercase;
            animation: blink 1.5s infinite;
        }

        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* --- BOARD --- */
        #board-container {
            display: none;
            width: 100%; height: 100%;
            background: 
                radial-gradient(circle, #3d342b 0%, #1f1b15 100%);
            position: relative;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            padding: 50px;
        }

        #string-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .red-string {
            stroke: #d00;
            stroke-width: 2;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawStr 1.5s forwards;
            opacity: 0.8;
        }

        @keyframes drawStr { to { stroke-dashoffset: 0; } }

        /* --- POSTER --- */
        .poster {
            z-index: 2;
            margin: 20px;
            position: relative;
            width: 200px;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .poster:hover { transform: scale(1.15); }

        .poster-card {
            background: #e8dfc5;
            color: #111;
            padding: 10px;
            border: 1px solid #888;
            box-shadow: 3px 3px 10px #000;
            transform: rotate(-1deg);
        }

        .poster:nth-child(even) .poster-card { transform: rotate(2deg); }

        .poster-img {
            width: 100%; height: 180px;
            object-fit: cover;
            filter: sepia(40%) contrast(1.1);
            border: 2px solid #000;
            background: #333;
        }

        .poster-title {
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: 1.8rem;
            margin: 5px 0;
            border-bottom: 2px solid #000;
        }

        .case-text {
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        /* --- MODAL --- */
        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1001;
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            background: #e0d8c0;
            color: #111;
            width: 450px;
            max-width: 90%;
            padding: 30px;
            position: relative;
            box-shadow: 0 0 40px #000;
            text-align: center;
        }

        .close-btn {
            position: absolute;
            top: -15px; right: -15px;
            background: #fff;
            border: 2px solid #000;
            width: 35px; height: 35px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover { transform: rotate(90deg); background: #8a0b0b; color: #fff; border-color: #fff; }

        .modal-img {
            width: 120px; height: 120px;
            border-radius: 50%;
            border: 3px solid #000;
            object-fit: cover;
            margin-bottom: 20px;
        }

        .modal-quote {
            font-style: italic;
            font-size: 1.1rem;
            min-height: 50px;
            margin: 20px 0;
            line-height: 1.4;
        }

        .fake-links { display: flex; gap: 10px; justify-content: center; }

        .link-btn {
            background: #000;
            color: #fff;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            font-family: 'Courier Prime', monospace;
        }

        .link-btn:hover { background: #8a0b0b; }
    </style>
</head>
<body>

    <!-- INTRO -->
    <div id="intro-screen">
        <h1>ℭ-oas</h1>
        <p>proceed</p>
    </div>

    <!-- BOARD -->
    <div id="board-container">
        <svg id="string-svg"></svg>
    </div>

    <!-- MODAL -->
    <div id="modal">
        <div class="modal-box">
            <div class="close-btn" id="close-x">&times;</div>
            <h2 id="modal-name"></h2>
            <img src="" id="modal-img" class="modal-img">
            <p class="modal-quote" id="modal-quote"></p>
            <div class="fake-links">
                <button class="link-btn" id="btn1">DONT</button>
                <button class="link-btn" id="btn2">LET</button>
                <button class="link-btn" id="btn3">Go</button>
            </div>
        </div>
    </div>

    <script>
        // === DATA ===
        const members = [
            {
                name: "Julian Vane",
                img: "https://placehold.co/200x200/222/FFF?text=Julian",
                quote: "I don't have a memory problem. I have a problem with people pretending I don't remember.",
                socials: ["https://twitter.com", "https://instagram.com", "https://discord.com"]
            },
            {
                name: "Sera Cross",
                img: "https://placehold.co/200x200/333/FFF?text=Sera",
                quote: "Truth is obscure, covered in blood. Just how us detectives like it.",
                socials: ["https://facebook.com", "https://linkedin.com", "https://reddit.com"]
            },
            {
                name: "Marcus Dale",
                img: "https://placehold.co/200x200/111/FFF?text=Marcus",
                quote: "Everything connects. You just have to find the red string.",
                socials: ["https://github.com", "https://youtube.com", "https://twitch.tv"]
            }
        ];

        // === SETUP ===
        const intro = document.getElementById('intro-screen');
        const board = document.getElementById('board-container');
        const svg = document.getElementById('string-svg');
        const modal = document.getElementById('modal');
        const close = document.getElementById('close-x');
        
        let currentData = null;

        // === INTRO CLICK ===
        intro.addEventListener('click', () => {
            intro.style.opacity = '0';
            setTimeout(() => {
                intro.style.display = 'none';
                board.style.display = 'flex';
                setupBoard();
            }, 1000);
        });

        // === BUILD BOARD ===
        function setupBoard() {
            members.forEach((m, i) => {
                // Create poster HTML
                const div = document.createElement('div');
                div.className = 'poster';
                div.innerHTML = `
                    <div class="poster-card">
                        <img src="${m.img}" class="poster-img">
                        <div class="poster-title">${m.name}</div>
                        <div class="case-text">Case ${m.name}</div>
                    </div>
                `;
                div.addEventListener('click', () => openModal(m));
                board.appendChild(div);
            });

            // Wait for layout then draw strings
            setTimeout(drawStrings, 100);
        }

        // === DRAW STRINGS ===
        function drawStrings() {
            const posters = document.querySelectorAll('.poster');
            const positions = [];

            posters.forEach(p => {
                const rect = p.getBoundingClientRect();
                // Calculate center of poster relative to board
                positions.push({
                    x: rect.left + rect.width / 2,
                    y: rect.top + rect.height / 2
                });
            });

            // Connect every poster to every other poster
            for (let i = 0; i < positions.length; i++) {
                for (let j = i + 1; j < positions.length; j++) {
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", positions[i].x);
                    line.setAttribute("y1", positions[i].y);
                    line.setAttribute("x2", positions[j].x);
                    line.setAttribute("y2", positions[j].y);
                    line.classList.add("red-string");
                    svg.appendChild(line);
                }
            }
        }

        // === MODAL LOGIC ===
        function openModal(m) {
            currentData = m;
            document.getElementById('modal-name').innerText = m.name;
            document.getElementById('modal-img').src = m.img;
            quoteElement.innerText = "";
            modal.style.display = 'flex';
            
            // Typewriter effect
            let i = 0;
            const speed = 30;
            function type() {
                if (i < m.quote.length) {
                    quoteElement.innerText += m.quote.charAt(i);
                    i++;
                    setTimeout(type, speed);
                }
            }
            type();
        }

        // Modal close
        close.addEventListener('click', () => modal.style.display = 'none');
        
        // Link buttons
        document.getElementById('btn1').addEventListener('click', () => window.open(currentData.socials[0], '_blank'));
        document.getElementById('btn2').addEventListener('click', () => window.open(currentData.socials[1], '_blank'));
        document.getElementById('btn3').addEventListener('click', () => window.open(currentData.socials[2], '_blank'));

    </script>
</body>
</html>
